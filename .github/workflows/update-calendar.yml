name: Update calendar
on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分鐘執行一次
  workflow_dispatch:       # 可在 Actions 頁手動觸發測試

permissions:
  contents: write          # 允許 push 回 repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Write credentials
        run: echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > gcp-key.json
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Generate calendar
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./gcp-key.json
        run: python fetch_public.py

      - name: Cleanup credentials
        if: always()
        run: rm -f gcp-key.json

      - name: Commit & push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/calendar.txt
          git commit -m "Update calendar $(date +%F)" || echo "No changes"
          git pull --rebase origin main
          git push
